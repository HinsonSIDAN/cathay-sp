# Iberia (IB) — Asia Miles & Status Points earning as a Cathay member
# Sources (retrieved 2026-07-14):
#   - https://www.cathaypacific.com/cx/en_HK/our-partners/iberia.html
#   - Cathay 'Status Points and Asia Miles calculator' API
#     (api.cathaypacific.com/mpo-miles-services/v3/miles-calculator/calculates)
#   - Calculator page airline config footnotes

airline: Iberia
iata: IB
alliance: oneworld
earns_status_points: true
earns_asia_miles: true

asia_miles_rule: rate_pct x actual miles flown (per sector)
status_points_rule: >-
  Zone lookup by booking-class tier — see data/partner-earning-model.yaml.
  Tier letters below reference that shared matrix; the resolved per-zone
  values are expanded inline for convenience.

eligibility_notes: >-
  Asia Miles can be earned only in eligible fare classes on flights marketed and operated by Iberia, as well as on codeshare flights operated by all one world® carriers. Participating affiliate of Iberia: Iberia Express.

# Observed from the Cathay calculator API (authoritative, operational data).
earning:
  - cabin: Business
    fare_classes: [C, D, I, J, R]
    asia_miles_rate_pct: 125
    sp_tier: B
    status_points:
      ultra_short: 15
      short: 25
      medium_1: 45
      medium_2: 60
      long: 75
      ultra_long: 85
  - cabin: Premium Economy
    fare_classes: [W]
    asia_miles_rate_pct: 110
    sp_tier: D
    status_points:
      ultra_short: 10
      short: 15
      medium_1: 25
      medium_2: 30
      long: 40
      ultra_long: 45
  - cabin: Premium Economy
    fare_classes: [E, T]
    asia_miles_rate_pct: 100
    sp_tier: E
    status_points:
      ultra_short: 5
      short: 10
      medium_1: 20
      medium_2: 25
      long: 35
      ultra_long: 40
  - cabin: Economy
    fare_classes: [B, H, Y]
    asia_miles_rate_pct: 100
    sp_tier: F
    status_points:
      ultra_short: 5
      short: 10
      medium_1: 20
      medium_2: 25
      long: 35
      ultra_long: 40
  - cabin: Economy
    fare_classes: [F, G, K, L, M, N, Q, S, V, Z]
    asia_miles_rate_pct: 25
    sp_tier: J
    status_points:
      ultra_short: 5
      short: 5
      medium_1: 5
      medium_2: 10
      long: 10
      ultra_long: 10

# As published on the partner page (cathaypacific.com), for cross-reference.
published_page_table:
  - cabin: Business Class
    rows:
      - ['J, C, D, I, R', '125% of actual miles flown']
  - cabin: Premium Economy Class
    rows:
      - ['W', '110% of actual miles flown']
      - ['E, T', '100% of actual miles flown']
  - cabin: Economy Class
    rows:
      - ['Y, B, H', '100% of actual miles flown']
      - ['K, L, M, V, S, N, Q, F, G, Z', '25% of actual miles flown']

