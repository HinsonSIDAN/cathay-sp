# Malaysia Airlines (MH) — Asia Miles & Status Points earning as a Cathay member
# Sources (retrieved 2026-07-14):
#   - https://www.cathaypacific.com/cx/en_HK/our-partners/malaysia-airlines.html
#   - Cathay 'Status Points and Asia Miles calculator' API
#     (api.cathaypacific.com/mpo-miles-services/v3/miles-calculator/calculates)
#   - Calculator page airline config footnotes

airline: Malaysia Airlines
iata: MH
alliance: oneworld
earns_status_points: true
earns_asia_miles: true

asia_miles_rule: rate_pct x actual miles flown (per sector)
status_points_rule: >-
  Zone lookup by booking-class tier — see data/partner-earning-model.yaml.
  Tier letters below reference that shared matrix; the resolved per-zone
  values are expanded inline for convenience.

eligibility_notes: >-
  Asia Miles can be earned only in eligible fare classes on flights marketed and operated by Malaysia Airlines, as well as on codeshare flights operated by all one world® carriers.

# Observed from the Cathay calculator API (authoritative, operational data).
earning:
  - cabin: First
    fare_classes: [A, F, P]
    asia_miles_rate_pct: 150
    sp_tier: A
    status_points:
      ultra_short: 15
      short: 25
      medium_1: 50
      medium_2: 70
      long: 90
      ultra_long: 100
  - cabin: Business
    fare_classes: [C, D, J, Z]
    asia_miles_rate_pct: 125
    sp_tier: B
    status_points:
      ultra_short: 15
      short: 25
      medium_1: 45
      medium_2: 60
      long: 75
      ultra_long: 85
  - cabin: Economy
    fare_classes: [B, H, Y]
    asia_miles_rate_pct: 100
    sp_tier: F
    status_points:
      ultra_short: 5
      short: 10
      medium_1: 20
      medium_2: 25
      long: 35
      ultra_long: 40
  - cabin: Economy
    fare_classes: [K, M]
    asia_miles_rate_pct: 50
    sp_tier: H
    status_points:
      ultra_short: 5
      short: 10
      medium_1: 15
      medium_2: 15
      long: 20
      ultra_long: 25

# As published on the partner page (cathaypacific.com), for cross-reference.
published_page_table:
  - cabin: Business Suite
    rows:
      - ['F, A, P', '150% of actual miles flown']
  - cabin: Business Class
    rows:
      - ['J, C, D, Z', '125% of actual miles flown']
  - cabin: Economy Class
    rows:
      - ['Y, B, H', '100% of actual miles flown']
      - ['K, M', '50% of actual miles flown']

