# Fiji Airways (FJ) — Asia Miles & Status Points earning as a Cathay member
# Sources (retrieved 2026-07-14):
#   - https://www.cathaypacific.com/cx/en_HK/our-partners/fiji-airways.html
#   - Cathay 'Status Points and Asia Miles calculator' API
#     (api.cathaypacific.com/mpo-miles-services/v3/miles-calculator/calculates)
#   - Calculator page airline config footnotes

airline: Fiji Airways
iata: FJ
alliance: oneworld
earns_status_points: true
earns_asia_miles: true

asia_miles_rule: rate_pct x actual miles flown (per sector)
status_points_rule: >-
  Zone lookup by booking-class tier — see data/partner-earning-model.yaml.
  Tier letters below reference that shared matrix; the resolved per-zone
  values are expanded inline for convenience.

eligibility_notes: >-
  Asia Miles can be earned only in eligible fare classes on - Flights marketed and operated by Fiji Airways; - Flights marketed by Fiji Airways and operated by Cathay Pacific.

# Observed from the Cathay calculator API (authoritative, operational data).
earning:
  - cabin: Business
    fare_classes: [C, J]
    asia_miles_rate_pct: 150
    sp_tier: B
    status_points:
      ultra_short: 15
      short: 25
      medium_1: 45
      medium_2: 60
      long: 75
      ultra_long: 85
  - cabin: Business
    fare_classes: [D, I, Z]
    asia_miles_rate_pct: 125
    sp_tier: C
    status_points:
      ultra_short: 10
      short: 20
      medium_1: 35
      medium_2: 50
      long: 65
      ultra_long: null  # no eligible route this long exists
  - cabin: Economy
    fare_classes: [B, H, K, Y]
    asia_miles_rate_pct: 100
    sp_tier: F
    status_points:
      ultra_short: 5
      short: 10
      medium_1: 20
      medium_2: 25
      long: 35
      ultra_long: 40
  - cabin: Economy
    fare_classes: [L, M, W]
    asia_miles_rate_pct: 75
    sp_tier: G
    status_points:
      ultra_short: 5
      short: 10
      medium_1: 15
      medium_2: 20
      long: 25
      ultra_long: 30
  - cabin: Economy
    fare_classes: [N, S, V]
    asia_miles_rate_pct: 50
    sp_tier: H
    status_points:
      ultra_short: 5
      short: 10
      medium_1: 15
      medium_2: 15
      long: 20
      ultra_long: 25
  - cabin: Economy
    fare_classes: [A, F, G, O, P, Q, R, T]
    asia_miles_rate_pct: 25
    sp_tier: J
    status_points:
      ultra_short: 5
      short: 5
      medium_1: 5
      medium_2: 10
      long: 10
      ultra_long: 10

# As published on the partner page (cathaypacific.com), for cross-reference.
published_page_table:
  - cabin: Business Class
    rows:
      - ['J, C', '150% of actual miles flown']
      - ['D, Z, I', '125% of actual miles flown']
  - cabin: Economy Class
    rows:
      - ['Y, B, H, K', '100% of actual miles flown']
      - ['M, L, W', '75% of actual miles flown']
      - ['V, S, N', '50% of actual miles flown']
      - ['Q, O, T, G, R, F, P, A', '25% of actual miles flown']

