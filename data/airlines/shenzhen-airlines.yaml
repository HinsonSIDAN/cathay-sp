# Shenzhen Airlines (ZH) — Asia Miles & Status Points earning as a Cathay member
# Sources (retrieved 2026-07-14):
#   - https://www.cathaypacific.com/cx/en_HK/our-partners/shenzhen-airlines.html
#   - Cathay 'Status Points and Asia Miles calculator' API
#     (api.cathaypacific.com/mpo-miles-services/v3/miles-calculator/calculates)
#   - Calculator page airline config footnotes

airline: Shenzhen Airlines
iata: ZH
alliance: Star Alliance
earns_status_points: false
earns_asia_miles: true

asia_miles_rule: rate_pct x actual miles flown (per sector)
status_points_rule: >-
  None. Status Points are only earned on Cathay Pacific and oneworld
  member airlines; this partner earns Asia Miles only (calculator
  returns 0 Status Points for all fare classes).

eligibility_notes: >-
  Asia Miles can be earned only in eligible fare classes on the routes below: Flights marketed and operated by Shenzhen Airlines: domestic routes within Mainland China, routes between Mainland China and Hong Kong, Macao or Taiwan Region.

# Observed from the Cathay calculator API (authoritative, operational data).
earning:
  - cabin: Business
    fare_classes: [C, J]
    asia_miles_rate_pct: 150
    status_points: 0
  - cabin: Business
    fare_classes: [D, R, Z]
    asia_miles_rate_pct: 125
    status_points: 0
  - cabin: Premium Economy
    fare_classes: [G]
    asia_miles_rate_pct: 110
    status_points: 0
  - cabin: Premium Economy
    fare_classes: [E]
    asia_miles_rate_pct: 100
    status_points: 0
  - cabin: Economy
    fare_classes: [B, H, M, U, Y]
    asia_miles_rate_pct: 100
    status_points: 0
  - cabin: Economy
    fare_classes: [Q, S, T, V, W]
    asia_miles_rate_pct: 50
    status_points: 0
  - cabin: Economy
    fare_classes: [A, K, L, P]
    asia_miles_rate_pct: 25
    status_points: 0

# As published on the partner page (cathaypacific.com), for cross-reference.
published_page_table:
  - cabin: Business Class
    rows:
      - ['J, C', '150% of actual miles flown']
      - ['D, Z, R', '125% of actual miles flown']
  - cabin: Premium Economy Class
    rows:
      - ['G', '110% of actual miles flown']
      - ['E', '100% of actual miles flown']
  - cabin: Economy Class
    rows:
      - ['Y, B, M, U, H', '100% of actual miles flown']
      - ['Q, V, W, S, T', '50% of actual miles flown']
      - ['A, L, K, P', '25% of actual miles flown']

