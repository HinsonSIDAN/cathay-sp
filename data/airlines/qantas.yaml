# Qantas (QF) — Asia Miles & Status Points earning as a Cathay member
# Sources (retrieved 2026-07-14):
#   - https://www.cathaypacific.com/cx/en_HK/our-partners/qantas.html
#   - Cathay 'Status Points and Asia Miles calculator' API
#     (api.cathaypacific.com/mpo-miles-services/v3/miles-calculator/calculates)
#   - Calculator page airline config footnotes

airline: Qantas
iata: QF
alliance: oneworld
earns_status_points: true
earns_asia_miles: true

asia_miles_rule: rate_pct x actual miles flown (per sector)
status_points_rule: >-
  Zone lookup by booking-class tier — see data/partner-earning-model.yaml.
  Tier letters below reference that shared matrix; the resolved per-zone
  values are expanded inline for convenience.

eligibility_notes: >-
  Asia Miles can be earned only in eligible fare classes on: - Flights marketed and operated Qantas , codeshare flights marketed by Qantas and operated by QantasLink, Sunstate Airlines, Eastern Australia Airlines or any one world® member airline

# Observed from the Cathay calculator API (authoritative, operational data).
earning:
  - cabin: First
    fare_classes: [A, F]
    asia_miles_rate_pct: 150
    sp_tier: A
    status_points:
      ultra_short: 15
      short: 25
      medium_1: 50
      medium_2: 70
      long: 90
      ultra_long: 100
  - cabin: Business
    fare_classes: [C, D, I, J]
    asia_miles_rate_pct: 125
    sp_tier: B
    status_points:
      ultra_short: 15
      short: 25
      medium_1: 45
      medium_2: 60
      long: 75
      ultra_long: 85
  - cabin: Premium Economy
    fare_classes: [R, T, W]
    asia_miles_rate_pct: 110
    sp_tier: D
    status_points:
      ultra_short: 10
      short: 15
      medium_1: 25
      medium_2: 30
      long: 40
      ultra_long: 45
  - cabin: Economy
    fare_classes: [Y]
    asia_miles_rate_pct: 100
    sp_tier: F
    status_points:
      ultra_short: 5
      short: 10
      medium_1: 20
      medium_2: 25
      long: 35
      ultra_long: 40
  - cabin: Economy
    fare_classes: [B, H, K, L, M, V]
    asia_miles_rate_pct: 50
    sp_tier: H
    status_points:
      ultra_short: 5
      short: 10
      medium_1: 15
      medium_2: 15
      long: 20
      ultra_long: 25

# As published on the partner page (cathaypacific.com), for cross-reference.
published_page_table:
  - cabin: First Class
    rows:
      - ['F, A', '150% of actual miles flown']
  - cabin: Business Class
    rows:
      - ['J, C, D, I', '125% of actual miles flown']
  - cabin: Premium Economy Class
    rows:
      - ['W, R, T', '110% of actual miles flown']
  - cabin: Economy Class
    rows:
      - ['Y', '100% of actual miles flown']
      - ['B, H, K, L, M, V', '25% of actual miles flown']

discrepancies:
  - >-
    The partner page lists discounted economy B, H, K, L, M, V at 25% of miles
    flown, but the calculator prices these classes at 50% (SP tier H) on all
    probed routes as of 2026-07-14. The calculator (operational data) is taken
    as primary here; the page table appears stale.
